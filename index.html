<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Clima </title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
   
    <div id="container">

         <header>
            <p> Api do clima da Open Weather </p>
    </header>

        <form id="search">
            <i class="fa-sharp fa-solid fa-location-dot"></i>

            <input type="search" id="city_name" name="city_name" placeholder="Buscar cidade" required>

            <button type="submit"> <i class="fa-solid fa-magnifying-glass"></i> </button>
        </form>

        <div id="weather" class= "show">
            <h1 id="title"> São Paulo</h1>

            <div id="infos">
                <div id="temp">
                    <img id = "temp_img" src="https://openweathermap.org/img/wn/04d@2x.png" alt="">

                    <div>
                        <p id="temp_value">
                            32 <sub>°C</sub>
                
                        </p>

                        <p id="temp_description">
                            Céu limpo
                        </p>
                    </div>    

                    <div id="other_infos">

                        <div class="info"> 
                            <i id="temp_max_icon" class="fa-regular fa-solid fa-temperature-high"></i>
                            
                            <div>
                                <h2> Temp. max </h2>
                                <p id="temp_max">
                                    32 <sub>°C</sub>
                                </p>
                            </div>
                        </div>

                        <div class="info"> 
                            <i id="temp_min_icon" class="fa-regular fa-solid fa-temperature-low"></i>

                            <div>
                                <h2> Temp. min </h2>
                                <p id="temp_min">
                                    10<sub>°C</sub>
                                </p>
                            </div>
                        </div>

                        <div class="info"> 
                            <i id="humidity_icon" class="fa-solid fa-droplet"></i>

                            <div>
                                <h2> humidade </h2>
                                <p id="humidity">
                                    10<sub>°C</sub>
                                </p>
                            </div>
                        </div>

                        
                        <div class="info"> 
                            <i id="wind_icon" class="fa-solid fa-wind"></i>

                            <div>
                                <h2> Velocidade do vento </h2>
                                <p id="wind">
                                    10<sub>km/h</sub>
                                </p>
                            </div>
                        </div>
                    </div>

                    
                </div>
            
            
            </div>

        </div>

        <div id="alert"> 
        </div>

         <footer>
        <p> Desenvolvido por Milena e Letícia Pires do 3°B </p>
    </footer>
    </div>


<script src="app.js"> </script>
</body>
</html>
